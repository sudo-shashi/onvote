name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + test + build (frontend) ────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          VITE_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_STELLAR_CONTRACT_ID: ${{ secrets.VITE_STELLAR_CONTRACT_ID }}
          VITE_STELLAR_EXPLORER_URL: https://stellar.expert/explorer/testnet

  # ── Contract — compile to WASM ─────────────────────────────
  contract:
    name: Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            poll_contract/target
          key: cargo-${{ runner.os }}-${{ hashFiles('poll_contract/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check for errors
        run: cargo check --manifest-path poll_contract/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path poll_contract/Cargo.toml

      - name: Compile to WASM
        run: cargo build --manifest-path poll_contract/Cargo.toml --target wasm32v1-none --release
